<svg xmlns="http://www.w3.org/2000/svg" width="60" height="320" viewBox="0 0 60 320" fill="none">

  <!-- PCB traces: L-shaped Manhattan routing -->
  <g stroke="#000000" stroke-width="0.9" opacity="0.18" fill="none" stroke-linecap="square">

    <!-- === ZONE 1 (y 0–100) === -->
    <!-- Vertical bus segments (broken, not full-height) -->
    <line x1="10" y1="0"  x2="10" y2="22"/>
    <line x1="10" y1="36" x2="10" y2="68"/>
    <line x1="10" y1="80" x2="10" y2="100"/>
    <line x1="38" y1="0"  x2="38" y2="14"/>
    <line x1="38" y1="55" x2="38" y2="100"/>
    <line x1="55" y1="0"  x2="55" y2="42"/>
    <line x1="55" y1="55" x2="55" y2="100"/>

    <!-- IC chip 1 body: x=4-24, y=22-36 -->
    <rect x="4"  y="22" width="20" height="14" rx="1"/>
    <!-- pins top -->
    <line x1="9"  y1="17" x2="9"  y2="22"/>
    <line x1="17" y1="17" x2="17" y2="22"/>
    <!-- pins bottom -->
    <line x1="9"  y1="36" x2="9"  y2="41"/>
    <line x1="17" y1="36" x2="17" y2="41"/>

    <!-- Route: chip-1 right-side to right bus, 90° bend -->
    <polyline points="24,29 38,29 38,14"/>
    <!-- Route: chip bottom-pin down to horizontal, then right -->
    <polyline points="9,41 9,55 38,55"/>
    <polyline points="17,41 17,55"/>

    <!-- Route: left bus to right bus via horizontal -->
    <polyline points="0,68 10,68 10,75 38,75 38,82 55,82"/>
    <!-- Short stub from right bus -->
    <line x1="55" y1="42" x2="60" y2="42"/>
    <line x1="0"  y1="90" x2="10" y2="90"/>

    <!-- === ZONE 2 (y 100–210) === -->
    <line x1="10" y1="100" x2="10" y2="145"/>
    <line x1="10" y1="160" x2="10" y2="210"/>
    <line x1="38" y1="100" x2="38" y2="118"/>
    <line x1="38" y1="155" x2="38" y2="172"/>
    <line x1="38" y1="185" x2="38" y2="210"/>
    <line x1="55" y1="100" x2="55" y2="115"/>
    <line x1="55" y1="130" x2="55" y2="155"/>
    <line x1="55" y1="172" x2="55" y2="210"/>

    <!-- IC chip 2 (wider, 4 pins): x=28-58, y=115-130 -->
    <rect x="28" y="115" width="26" height="15" rx="1"/>
    <!-- pins left -->
    <line x1="22" y1="119" x2="28" y2="119"/>
    <line x1="22" y1="126" x2="28" y2="126"/>
    <!-- pins right -->
    <line x1="54" y1="119" x2="60" y2="119"/>
    <line x1="54" y1="126" x2="60" y2="126"/>

    <!-- Routing around chip 2 -->
    <polyline points="10,145 22,145 22,119"/>
    <polyline points="10,160 22,160 22,126"/>
    <polyline points="0,172 10,172 10,160"/>
    <polyline points="38,172 38,185"/>
    <!-- Horizontal connector -->
    <polyline points="0,135 10,135 10,145"/>
    <polyline points="38,155 55,155"/>

    <!-- === ZONE 3 (y 210–320) === -->
    <line x1="10" y1="210" x2="10" y2="250"/>
    <line x1="10" y1="265" x2="10" y2="320"/>
    <line x1="38" y1="210" x2="38" y2="232"/>
    <line x1="38" y1="248" x2="38" y2="320"/>
    <line x1="55" y1="210" x2="55" y2="320"/>

    <!-- IC chip 3: x=4-26, y=250-265 -->
    <rect x="4"  y="250" width="22" height="15" rx="1"/>
    <!-- pins top -->
    <line x1="10" y1="244" x2="10" y2="250"/>
    <line x1="20" y1="244" x2="20" y2="250"/>
    <!-- pins bottom -->
    <line x1="10" y1="265" x2="10" y2="270"/>
    <line x1="20" y1="265" x2="20" y2="270"/>

    <!-- Routing bottom section -->
    <polyline points="26,257 38,257 38,248"/>
    <polyline points="38,232 55,232 55,210"/>
    <polyline points="20,270 20,280 38,280 38,290 55,290"/>
    <polyline points="0,300 10,300 10,290 20,290"/>
    <polyline points="0,220 10,220 10,232 20,232 20,244"/>
  </g>

  <!-- Solder pads (filled circles at junctions) -->
  <g fill="#000000" opacity="0.26">
    <!-- Zone 1 -->
    <circle cx="9"  cy="17" r="2"/>
    <circle cx="17" cy="17" r="2"/>
    <circle cx="9"  cy="41" r="2"/>
    <circle cx="17" cy="41" r="2"/>
    <circle cx="38" cy="14" r="2.5"/>
    <circle cx="38" cy="29" r="2.5"/>
    <circle cx="9"  cy="55" r="2.5"/>
    <circle cx="38" cy="55" r="2"/>
    <circle cx="10" cy="75" r="2"/>
    <circle cx="38" cy="75" r="2"/>
    <circle cx="55" cy="82" r="2"/>
    <!-- Zone 2 -->
    <circle cx="22" cy="119" r="2.5"/>
    <circle cx="22" cy="126" r="2.5"/>
    <circle cx="10" cy="145" r="2.5"/>
    <circle cx="10" cy="160" r="2.5"/>
    <circle cx="38" cy="155" r="2"/>
    <circle cx="55" cy="155" r="2"/>
    <!-- Zone 3 -->
    <circle cx="10" cy="244" r="2"/>
    <circle cx="20" cy="244" r="2"/>
    <circle cx="10" cy="270" r="2"/>
    <circle cx="20" cy="270" r="2"/>
    <circle cx="38" cy="257" r="2.5"/>
    <circle cx="55" cy="232" r="2"/>
    <circle cx="38" cy="280" r="2"/>
    <circle cx="55" cy="290" r="2"/>
    <circle cx="20" cy="280" r="2"/>
  </g>

  <!-- Via holes (annular rings) -->
  <g fill="none" stroke="#000000" stroke-width="0.9" opacity="0.14">
    <circle cx="10" cy="90"  r="2.2"/>
    <circle cx="55" cy="42"  r="2.2"/>
    <circle cx="10" cy="135" r="2.2"/>
    <circle cx="38" cy="185" r="2.2"/>
    <circle cx="55" cy="172" r="2.2"/>
    <circle cx="10" cy="300" r="2.2"/>
    <circle cx="20" cy="232" r="2.2"/>
  </g>

</svg>
