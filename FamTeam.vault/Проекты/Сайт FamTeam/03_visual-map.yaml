visual_content_map:
  article_title: "Сколько стоит AI-сотрудник: гайд по бюджету для малого и среднего бизнеса"
  article_slug: "skolko-stoit-ai-sotrudnik"
  total_words: 2800
  total_sections: 10
  target_visuals: 8
  actual_visuals: 9
  coverage: "311 слов/визуал (target: 300-500 ✓)"

  visuals:
    - id: VIS-001
      position: before_h1
      type: hero_cover
      dimensions: "1200x630"
      priority: must-have
      brief: |
        Героический пост о цене AI-сотрудника.
        Левая сторона: стек компонентов (иконки: LLM, платформа, каналы, разработка, поддержка).
        Правая сторона: большой текст "от 5к до 500к+ ₽/мес" с красным #FF3B00 акцентом.
        Настроение: серьёзное, деловое (B2B), чёрно-белое + красный.
      style: "FamTeam дизайн-система: чёрно-белый + #FF3B00"
      alt_text: "AI-сотрудник для бизнеса: стоимость от 5000 до 500000 рублей в месяц"

    - id: VIS-002
      position: after_paragraph_1
      type: infographic
      dimensions: "800x500"
      priority: must-have
      brief: |
        Архитектурная диаграмма стека AI-сотрудника.
        5 слоёв (стек):
        1. LLM (мозг) — GPT-4o, Claude, YandexGPT иконки
        2. Платформа (нервная система) — Make, n8n, Albato иконки
        3. Каналы — Telegram, WhatsApp, CRM, Сайт иконки
        4. Разработка & настройка — цифры (15-500k)
        5. Поддержка & обновления — часы/мониторинг иконка
        Каждый слой показывает "слой стоит денег" со стрелкой вверх по цене.
      style: "FamTeam: минимализм, иконки, вертикальный стек"
      alt_text: "Архитектура AI-сотрудника: 5 слоёв стека с иконками компонентов"
      data_from: "## Что считаем: AI-сотрудник как стек"

    - id: VIS-003
      position: after_paragraph_10
      type: comparison_table
      dimensions: "900x600"
      priority: must-have
      brief: |
        Сравнительная таблица моделей LLM.
        Столбцы: Модель | Тариф | Цена/мес | Для кого
        Строки: ChatGPT (Go, Plus, Business), Claude (Pro, Max), YandexGPT, GigaChat
        Визуально выделить:
        - Красные (обычные подписки): $20-30
        - Жёлтые (API/token-based): 1-5k ₽
        - Скрытые расходы подчеркнуть другим цветом
        Подзаголовок: "Ценовой диапазон растёт 30х в зависимости от нагрузки"
      style: "Таблица, мин-max подсвечены"
      alt_text: "Таблица сравнения цен LLM: от $8 ChatGPT Go до YandexGPT по токенам"
      data_from: "## Статья 1: Языковая модель"

    - id: VIS-004
      position: after_paragraph_16
      type: icon_grid
      dimensions: "800x450"
      priority: should-have
      brief: |
        Сетка 3 уровней бюджета с ROI-иконками.
        Уровень 1 (5-20k/мес): иконка стартапа + часы (20-40ч экономии)
        Уровень 2 (30-80k/мес): иконка растущей фирмы + люди (1 ставка администратора)
        Уровень 3 (100k+/мес): иконка корпорации + телефоны (call-центр)
        Каждый блок: цена, что входит, экономия на одной строке.
        Цвета: серый → жёлтый → красный (#FF3B00) по мере роста.
      style: "FamTeam иконки + цветовая гамма"
      alt_text: "3 уровня бюджета для AI: от стартапа (5k) до корпорации (100k+)"
      data_from: "## Три уровня бюджета"

    - id: VIS-005
      position: after_paragraph_25
      type: case_study_infographic
      dimensions: "900x600"
      priority: must-have
      brief: |
        Реальный ROI кейс: стоматологическая сеть.
        Левая сторона (БЫЛО):
        - 3 администратора × $3000 = $9000/мес
        - 300+ звонков в день
        - 35% потерь (не дозвониваются)
        Стрелка трансформации ↓↓↓
        Правая сторона (СТАЛО):
        - 1 администратор (экономия $6000/мес)
        - 100% обработка входящих
        - Окупаемость: 2 месяца
        - Чистая экономия через 6 месяцев: 360k ₽
        Центр: большой текст "ROI 150-400% через 6 месяцев"
      style: "Before/After, красные цифры для экономии"
      alt_text: "Кейс стоматологии: с 3 администраторов на 1, окупаемость 2 месяца, экономия 360k"
      data_from: "## ROI: считаем честно"

    - id: VIS-006
      position: after_paragraph_30
      type: warning_infographic
      dimensions: "800x500"
      priority: should-have
      brief: |
        4 скрытых расхода, которые забывают.
        Иконки-блоки 2x2:
        1. Часы обучения команды (5-10 часов) — иконка люди + часы
        2. Доработки после запуска (20-30% от бюджета) — иконка гаечный ключ
        3. Хранение данных 152-ФЗ (1-15k ₽/мес) — иконка сервер + замок
        4. Мониторинг качества (2-4 часа/мес) — иконка микроскоп
        Каждый блок с суммой "добавьте к бюджету".
        Подзаголовок жирный: "Это НЕ входит в стоимость разработки"
      style: "Warning-стиль (оранжевые рамки), чёрный текст"
      alt_text: "4 скрытых расхода: обучение, доработки, серверы, мониторинг"
      data_from: "## Скрытые расходы"

    - id: VIS-007
      position: after_paragraph_35
      type: decision_tree
      dimensions: "800x500"
      priority: must-have
      brief: |
        Дерево решений: "Где AI НЕ окупается".
        Корень: "23% внедрений проваливаются"
        4 ветви (4 ошибки):
        1. "Автоматизировать хаос" → процесс не описан → крест ✗
        2. "Завышенные ожидания" → ждёте идеала с первого дня → крест ✗
        3. "Сложное решение на старте" → платите за функции, которые не нужны → крест ✗
        4. "Игнорировать поддержку" → API меняется, бот встаёт → крест ✗
        Каждая ветка с жирным красным X.
        Финал: "Результат: потраченные деньги, боль"
      style: "Decision tree, красные иксы, минимализм"
      alt_text: "4 ошибки, почему AI-сотрудник НЕ окупается"
      data_from: "## Где AI-сотрудник не окупается"

    - id: VIS-008
      position: after_paragraph_42
      type: checklist_timeline
      dimensions: "800x450"
      priority: should-have
      brief: |
        Временная шкала внедрения AI за 3 месяца.
        Слева направо (месяцы):
        Месяц 1: "Одна задача" (зелёная галочка)
        Месяц 2: "Считаем ROI" (жёлтая точка)
        Месяц 3: "Выход на режим" (красная флаг)
        Под каждым блоком: "Чекпоинты выполнены", "ROI рассчитан", "Масштабируем"
        Финал: бюджет, который окупился.
      style: "Горизонтальная временная шкала, FamTeam цвета"
      alt_text: "3 шага внедрения AI: одна задача, расчёт ROI, выход на режим"
      data_from: "## Как начать внедрение"

    - id: VIS-009
      position: before_conclusion
      type: summary_table
      dimensions: "900x500"
      priority: must-have
      brief: |
        Финальная сводная таблица ИТОГО.
        Столбцы: Сценарий | Разовые затраты | Ежемесячно | Окупаемость
        Строки:
        1. Минимальный старт | 15-30k ₽ | 5-20k ₽ | 3-4 мес
        2. Рабочая связка | 80-150k ₽ | 30-80k ₽ | 3-6 мес
        3. Полная автоматизация | 200-500k ₽ | 100k+ ₽ | 6-12 мес
        Выделить РЕКОМЕНДУЕМЫЙ вариант (уровень 2) золотым бордюром.
        Подпись: "Для большинства МСБ — уровень 2 оптимален"
      style: "Таблица с золотым акцентом на оптимальный вариант"
      alt_text: "Итоговая таблица: сценарии, затраты, окупаемость"
      data_from: "## Итого: сколько стоит AI-сотрудник"

