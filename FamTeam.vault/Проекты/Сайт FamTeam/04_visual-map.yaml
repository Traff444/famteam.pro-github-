visual_content_map:
  article_title: "AI-сотрудник для бизнеса: кейсы с ROI и внедрение за 3 дня"
  article_slug: "ai-sotrudnik-kejsy-vnedreniye"
  total_words: 3500
  total_sections: 5
  target_visuals: 10
  actual_visuals: 10
  coverage: "350 слов/визуал (target: 300-500 ✓)"

  visuals:
    - id: VIS-001
      position: before_h1
      type: hero_cover
      dimensions: "1200x630"
      priority: must-have
      brief: |
        Героический пост о кейсах AI-сотрудника.
        Левая сторона: 3 иконки бизнеса (салон красоты, стоматология, онлайн-школа).
        Центр: большой текст "КЕЙСЫ" с красным #FF3B00 акцентом.
        Правая сторона: цифры ROI "↑95% конверсия", "↓2 недели окупаемость", "+$12k выручка".
        Настроение: успех, рост, B2B, доверие.
      style: "FamTeam дизайн-система: чёрно-белый + #FF3B00"
      alt_text: "AI-сотрудник: реальные кейсы с цифрами ROI и окупаемостью"

    - id: VIS-002
      position: after_paragraph_1
      type: case_study_grid
      dimensions: "900x600"
      priority: must-have
      brief: |
        Сетка 3 кейсов внедрения AI.
        Каждый блок (3x1):
        1. САЛОН "Нежность" (Москва):
           - Было: 37% конверсия, администратор не справляется
           - Стало: 95% конверсия, +18% выручка
           - Окупаемость: 2 НЕДЕЛИ
           - Иконка: ножницы/кресло для волос

        2. СТОМАТОЛОГИЯ "Улыбка" (СПб):
           - Было: 35% потерь звонков
           - Стало: +40% новых клиентов, врач экономит 3 часа/день
           - Окупаемость: 3 НЕДЕЛИ
           - Иконка: зуб

        3. ОНЛАЙН-ШКОЛА (дистанционно):
           - Было: 8% конверсия, менеджер 6 часов на вопросы
           - Стало: 11,2% конверсия, +$12k выручки/мес
           - Окупаемость: 2.5 ДНЯ (!!)
           - Иконка: книга

        Каждый блок цветной (разные оттенки серого), финал красный большой текст с днями/неделями.
      style: "3-колонна сетка, иконки ниш, цифры выделены красным"
      alt_text: "3 реальных кейса: салон (2 нед), стоматология (3 нед), школа (2.5 дня окупаемость)"
      data_from: "## 1. Реальные кейсы с цифрами"

    - id: VIS-003
      position: after_paragraph_8
      type: infographic
      dimensions: "800x500"
      priority: must-have
      brief: |
        Сравнение 3 вариантов внедрения по 5 параметрам.
        Визуально: 3 колонны (конструктор, фриланс, готовое решение).
        Параметры (горизонтально):
        1. Скорость запуска: 1 день | 2-3 месяца | 2-4 недели
        2. Качество диалогов: низкое (FAQ) | зависит | высокое (AI)
        3. Поддержка: ограниченная | платная | 24/7 включена
        4. ROI прозрачность: нет | неясна | высокая ✓
        5. Риск фиаско: низкий | высокий ⚠ | низкий ✓

        Выделить зелёным галочку у "готового решения" по всем параметрам.
        Жёлтые/красные знаки для проблемных вариантов.
      style: "Сравнительная матрица, цветные иконки, галочки/знаки"
      alt_text: "Сравнение 3 вариантов: конструктор vs фриланс vs готовое решение"
      data_from: "## 2. Как выбрать: конструктор, фриланс или готовое решение"

    - id: VIS-004
      position: after_paragraph_15
      type: warning_infographic
      dimensions: "800x450"
      priority: should-have
      brief: |
        Реальная проблема фриланса: стоимость правок.
        Слева: разработчик создал хороший бот за $3000-5000.
        Стрелка вниз (2 месяца).
        Справа: нужно добавить 5 новых услуг в прайс.
        Текст: "Разработчик: $500 за это".
        Нижний текст красный: "Вы можете сделать сами? НЕТ. Код в его голове. Вы платите."
        Иконка: зависимость/цепь.
      style: "Before/After, красные числа, предупреждение"
      alt_text: "Риск фриланса: каждая правка = $500, зависимость от разработчика"
      data_from: "Вариант 2: Фриланс-разработчик"

    - id: VIS-005
      position: after_paragraph_22
      type: roi_calculator
      dimensions: "900x500"
      priority: must-have
      brief: |
        Быстрый расчёт ROI с цифрами.
        Слева (ВХОДНЫЕ ДАННЫЕ):
        - 50 заявок в день
        - 30% теряются (450 потерь/мес)
        - Средняя услуга $80
        - Потеря: 450 × $80 = $36,000/мес

        Стрелка (AI спасает 10% потерянных).

        Справа (РЕЗУЛЬТАТ):
        - 45 заявок спасено × $80 = $3,600/мес прибыль
        - Стоимость бота: -$900/мес
        - Чистая прибыль: $2,700/мес

        Финал (большой красный текст):
        "Окупаемость: НЕДЕЛЯ"

        Иконка калькулятора в центре.
      style: "Левая входные→стрелка→правая результат, красные цифры, жирный финал"
      alt_text: "ROI расчёт: 50 заявок/день → $3600 доход → $2700 чистой прибыли → неделя окупаемости"
      data_from: "### Быстрый расчёт ROI"

    - id: VIS-006
      position: after_paragraph_30
      type: comparison_table
      dimensions: "900x600"
      priority: must-have
      brief: |
        Таблица сравнения конструктор | фриланс | готовое решение.
        Столбцы: Критерий | Конструктор | Фриланс | Готовое решение
        Строки (12 параметров):
        - Скорость запуска: 1 день | 2-3 мес | 2-4 недели
        - Качество диалогов: низкое | зависит | высокое
        - Поддержка: ограниченная | платная | 24/7
        - Гибкость: высокая (в пределах платформы) | полная | высокая
        - Прозрачность ROI: нет | неясна | высокая
        - Риск фиаско: низкий | высокий | низкий
        - Скрытые затраты: 2-5 ч/мес | $500+ | минимальны
        - Кто отвечает: никто | разработчик | поставщик
        - Стоимость: $0-200/мес | $3-5k разово | $600-2000/мес
        - Результат: FAQ-бот | может быть OK | AI-сотрудник
        - Доп. часы: 2-5 в месяц | неизвестно | почти нет
        - Решение: обычный чат-бот | высокий риск | спокойствие

        Выделить РЕКОМЕНДАЦИЮ (готовое решение) золотым бордюром.
      style: "Полная таблица, разные цвета колонн, золотой бордюр на рекомендуемом"
      alt_text: "12 параметров сравнения: конструктор vs фриланс vs готовое решение"
      data_from: "## 2. Как выбрать: конструктор, фриланс или готовое решение"

    - id: VIS-007
      position: after_paragraph_45
      type: checklist_timeline
      dimensions: "900x450"
      priority: must-have
      brief: |
        Чек-лист подготовки за 2-4 недели.
        Временная шкала слева направо (недели):

        Неделя 1-2: "Собрать данные"
        - Расписание & доступность (иконка календарь)
        - Прайс & услуги (иконка $ знак)
        - FAQ & возражения (иконка вопроса)

        Неделя 2-3: "Интеграции"
        - CRM (Битрикс, AmoCRM, Sheets) иконка база
        - Платежи (Яндекс.Касса, Сбербанк) иконка карта
        - Email & календари иконка письмо

        Неделя 3-4: "Тон & примеры"
        - Тон голоса (вы/ты, официально/дружелюбно) иконка речь
        - Примеры диалогов (5-10) иконка чат

        Финал: "ГОТОВО К ЗАПУСКУ"
        Цвета: серый → жёлтый → зелёный (готово).
      style: "Горизонтальная временная шкала, 3 недели, зелёный финал"
      alt_text: "Чек-лист подготовки AI-сотрудника: 2-4 недели от сбора данных к запуску"
      data_from: "**Чек-лист подготовки (1–2 недели):**"

    - id: VIS-008
      position: after_paragraph_55
      type: timeline_infographic
      dimensions: "800x500"
      priority: should-have
      brief: |
        Линия времени "Что происходит после запуска".
        От верхнего левого угла вниз-направо (4 недели):

        День 1: "Бот работает. Клиенты пишут."
        День 1 вечер: "Чат-логи: 85% верных ответов ✓"
        Неделя 2: "Вижу ошибки в вопросах про переносы. Даю дополнительную информацию."
        Неделя 3: "Конверсия +20%! Менеджер: 'Спасибо, я вижу только горячие заявки'"
        Неделя 4: "ROI расчёт: 20 потерянных заявок спасено = $1000-2000/мес. Бот окупился!"
        Месяц 2: "Конверсия 40% (была 37%). Бот учится на новых диалогах."

        Каждый этап с иконкой (календарь, логи, сигнал-восклицание, наука, доллары).
        Цвет: серый → жёлтый → зелёный (успех).
      style: "Вертикальная временная шкала, иконки, цвета прогресса"
      alt_text: "4 недели после запуска: от 85% accuracy к +20% конверсии и окупаемости"
      data_from: "### Что происходит после запуска"

    - id: VIS-009
      position: after_paragraph_62
      type: error_warning
      dimensions: "800x500"
      priority: must-have
      brief: |
        6 ошибок при запуске чат-бота (с решениями).
        Сетка 3x2 (6 блоков):

        1. Начать с конструктора
           Ошибка: экономит 1 месяц, потом 20 часов на доработку
           Решение: оценить объём (>50/день → готовое решение)

        2. Не обновлять данные в боте
           Ошибка: "Свободна пятница", а мастер не работает
           Решение: автоматическая синхронизация расписания

        3. Бот отвечает, но никто не записывается
           Ошибка: тупик после второго сообщения ("Свяжитесь с менеджером")
           Решение: слушать чат-логи (первые 50 диалогов)

        4. Ждать идеального бота перед запуском
           Ошибка: идеального не будет, потратили 3 месяца на подготовку
           Решение: запустить "70% готовый" и улучшать по реальным диалогам

        5. Думать, что бот заменит менеджера
           Ошибка: не заменит, освободит только 70% времени
           Решение: переквалифицировать на "расширение продаж" (выше зарплата)

        6. Не читать чат-логи в первый месяц
           Ошибка: бот может работать неправильно (вы этого не видите)
           Решение: читайте 20 диалогов в неделю (1 час)

        Каждый блок: красный заголовок (ошибка), жёлтый блок, зелёное решение.
      style: "Сетка 3x2, красный/жёлтый/зелёный цвета, иконки ошибок"
      alt_text: "6 частых ошибок при запуске AI-бота и правильные решения"
      data_from: "## 4. Частые ошибки при запуске чат-бота"

    - id: VIS-010
      position: before_conclusion
      type: recommendation_graphic
      dimensions: "900x500"
      priority: must-have
      brief: |
        Финальная рекомендация и call-to-action.
        Левая сторона: ВЫВОД
        - Если у вас: 20-50 заявок/день, малый сервисный бизнес
        - Лучший выбор: AI-сотрудник (готовое решение)
        - Окупаемость: 2-4 недели
        - Результат: -35% потерь заявок, +18-40% конверсии

        Справа: ПРИБЫЛЬ
        - 40 потерянных заявок × $100 = $4000 спасено/мес
        - Стоимость бота: $600-900/мес
        - Чистая прибыль: $3100+/мес
        - Вывод: "Вы попадаете в зону победителя"

        Финал большой красный текст: "Начните с чата"
        Подтекст: "Если у вас есть Telegram/WhatsApp/Instagram — запустите AI-сотрудника"

        Иконка финальной фазы: рост, стрелка вверх.
      style: "Left/Right layout, цифры красные, финал жирный"
      alt_text: "Финальная рекомендация: 20-50 заявок → AI → 2-4 недели окупаемости → $3100 прибыль"
      data_from: "## 5. Вывод: что выбрать и когда начать"

