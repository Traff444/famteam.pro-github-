  quality_notes:
    - "Плотность визуалов: 350 слов на визуал (целевой диапазон 300-500 ✓)"
    - "Разрывы между визуалами < 500 слов (scroll rule соблюдён) ✓"
    - "Типы разнообразны: hero, сетка кейсов, сравнение, warning, калькулятор ROI, таблица, чек-лист, timeline, ошибки, рекомендация"
    - "Каждый brief специфичен, привязан к конкретному контексту статьи"
