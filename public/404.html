<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <script>
    // SPA redirect for GitHub Pages
    // Redirects all 404s to index.html with the path preserved
    var path = window.location.pathname;
    window.location.replace('/' + '?p=' + encodeURIComponent(path));
  </script>
</head>
<body></body>
</html>
